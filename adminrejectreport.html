<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Reject Reports Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

:root{
    --bg1:#071426;
    --bg2:#0f1f38;
    --card:rgba(255,255,255,0.08);
    --primary:#14b8a6;
    --danger:#ef4444;
    --text:#f8fafc;
    --muted:#94a3b8;
    --border:rgba(255,255,255,0.08);
    --shadow:0 20px 50px rgba(0,0,0,0.25);
}

body{
    background:
    radial-gradient(circle at top left, rgba(20,184,166,0.18), transparent 25%),
    radial-gradient(circle at bottom right, rgba(34,197,94,0.12), transparent 30%),
    linear-gradient(135deg,var(--bg1),var(--bg2));
    min-height:100vh;
    color:var(--text);
    padding:25px 15px 40px;
}

.container{
    max-width:1600px;
    margin:auto;
}

/* HEADER */

.header{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:28px;
    padding:30px;
    margin-bottom:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
    box-shadow:var(--shadow);
}

.header-left h1{
    font-size:34px;
    margin-bottom:10px;
}

.header-left p{
    color:#cbd5e1;
    max-width:700px;
    line-height:1.6;
}

.badge{
    display:inline-block;
    background:rgba(255,255,255,0.12);
    padding:10px 18px;
    border-radius:50px;
    font-size:13px;
    margin-bottom:15px;
    letter-spacing:1px;
}

.actions{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

/* BUTTONS */

.btn{
    border:none;
    padding:14px 18px;
    border-radius:16px;
    cursor:pointer;
    font-size:14px;
    font-weight:700;
    transition:0.25s;
    color:white;
}

.btn:hover{
    transform:translateY(-2px);
}

.back-btn{
    background:linear-gradient(135deg,#14b8a6,#22c55e);
}

.clear-btn{
    background:linear-gradient(135deg,#ef4444,#dc2626);
}

/* SEARCH */

.search-box{
    width:100%;
    padding:16px 18px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.1);
    background:rgba(255,255,255,0.06);
    color:white;
    outline:none;
    margin-bottom:25px;
    font-size:15px;
    backdrop-filter:blur(12px);
}

.search-box:focus{
    border-color:#14b8a6;
    box-shadow:0 0 0 4px rgba(20,184,166,0.15);
}

/* SUMMARY */

.summary-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.summary-card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:24px;
    padding:25px;
    box-shadow:var(--shadow);
}

.summary-card h3{
    color:#cbd5e1;
    font-size:14px;
    margin-bottom:12px;
}

.summary-card p{
    font-size:38px;
    font-weight:800;
    color:#67e8f9;
}

/* TABLE */

.folder-group{
    margin-bottom:30px;
}

.folder-header{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
    border-radius:22px 22px 0 0;
    padding:18px 22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

.folder-header h2{
    font-size:20px;
    color:#67e8f9;
}

.folder-header span{
    background:rgba(20,184,166,0.18);
    color:#99f6e4;
    padding:8px 14px;
    border-radius:50px;
    font-size:13px;
    font-weight:700;
}

.table-wrapper{
    overflow:auto;
    border-radius:0 0 22px 22px;
    border:1px solid rgba(255,255,255,0.08);
    border-top:none;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(12px);
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:1400px;
}

th{
    background:rgba(255,255,255,0.06);
    color:#67e8f9;
    padding:16px;
    text-align:left;
    font-size:13px;
}

td{
    padding:15px;
    border-bottom:1px solid rgba(255,255,255,0.05);
    font-size:13px;
    color:#e2e8f0;
}

tbody tr:hover{
    background:rgba(255,255,255,0.05);
    cursor:pointer;
}

/* MODAL */

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:999;
    padding:20px;
}

.modal-content{
    width:100%;
    max-width:750px;
    max-height:90vh;
    overflow:auto;
    background:#0f172a;
    border-radius:28px;
    padding:30px;
    border:1px solid rgba(255,255,255,0.08);
}

.modal-content h2{
    color:#67e8f9;
    margin-bottom:20px;
}

.modal-content p{
    margin-bottom:10px;
    line-height:1.6;
    color:#cbd5e1;
}

.modal-content b{
    color:white;
}

.img-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

.img-grid img{
    width:100%;
    border-radius:18px;
}

.close-btn{
    margin-top:20px;
    background:linear-gradient(135deg,#ef4444,#dc2626);
}

/* EMPTY */

.empty{
    padding:60px;
    text-align:center;
    color:#94a3b8;
    background:rgba(255,255,255,0.05);
    border-radius:24px;
}

.section-title{
    margin:20px 0 15px;
    color:#67e8f9;
    font-size:24px;
}

@media(max-width:768px){

.header-left h1{
    font-size:28px;
}

.actions{
    width:100%;
}

.btn{
    width:100%;
}

.summary-card p{
    font-size:28px;
}

}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<div class="header-left">

<div class="badge">
ADMIN DASHBOARD
</div>

<h1>🏭 Reject Reports Dashboard</h1>

<p>
Modern monitoring dashboard for tracking reject reports,
production issues, QA findings, and reject analytics.
</p>

</div>

<div class="actions">

<button class="btn back-btn" onclick="goBack()">
⬅ Back
</button>

<button class="btn clear-btn" onclick="clearData()">
🗑 Clear Data
</button>

</div>

</div>

<!-- SEARCH -->

<input
type="text"
id="searchInput"
class="search-box"
placeholder="🔍 Search batch, product, reason, location..."
onkeyup="renderReports()">

<!-- MAIN KPI -->

<div class="summary-grid">

<div class="summary-card">
<h3>Total Reject Reports</h3>
<p id="grandTotal">0</p>
</div>

<div class="summary-card">
<h3>Total Days (Folders)</h3>
<p id="grandDays">0</p>
</div>

</div>

<!-- REASON KPI -->

<h2 class="section-title">
📊 Reject Categories by Reason
</h2>

<div class="summary-grid" id="reasonKPI"></div>

<!-- REPORTS -->

<div id="reportsContainer"></div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content">

<h2>📋 Report Details</h2>

<div id="modalBody"></div>

<button class="btn close-btn" onclick="closeModal()">
Close
</button>

</div>

</div>

<script>

let FLAT_DATA = [];

/* BACK */

function goBack(){

    window.location.href = "adminmain.html";

}

/* CLEAR DATA */

function clearData(){

    const pass =
    prompt("Enter password to clear all data:");

    if(pass === "admin123"){

        if(confirm(
        "Delete ALL reject reports?"
        )){

            localStorage.removeItem("rejects");

            alert("All data deleted");

            renderReports();

        }

    }else{

        alert("Wrong password");

    }

}

/* GET REPORTS */

function getReports(){

    const data =
    localStorage.getItem("rejects");

    if(!data) return [];

    try{

        return JSON.parse(data);

    }catch{

        return [];

    }

}

/* FILTER */

function filterReports(reports){

    const q =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

    if(!q) return reports;

    return reports.filter(r =>

        (r.batchNo || "")
        .toLowerCase()
        .includes(q)

        ||

        (r.product || "")
        .toLowerCase()
        .includes(q)

        ||

        (r.reason || "")
        .toLowerCase()
        .includes(q)

        ||

        (r.location || "")
        .toLowerCase()
        .includes(q)

        ||

        (r.category || "")
        .toLowerCase()
        .includes(q)

        ||

        (r.rootCause || "")
        .toLowerCase()
        .includes(q)

    );

}

/* GROUP */

function groupReportsByDate(reports){

    let grouped = {};

    reports.forEach(r=>{

        let d = r.date || "No Date";

        if(!grouped[d]){

            grouped[d] = [];

        }

        grouped[d].push(r);

    });

    return grouped;

}

/* KPI */

function updateGrandSummary(reports,grouped){

    document.getElementById("grandTotal")
    .innerText = reports.length;

    document.getElementById("grandDays")
    .innerText = Object.keys(grouped).length;

    /* KPI REASON */

    const reasonContainer =
    document.getElementById("reasonKPI");

    let reasonCounts = {};

    reports.forEach(r=>{

        let reason =
        (r.reason || "Unknown").trim();

        if(!reasonCounts[reason]){

            reasonCounts[reason] = 0;

        }

        reasonCounts[reason]++;

    });

    let html = "";

    Object.keys(reasonCounts)
    .sort((a,b)=>
        reasonCounts[b] - reasonCounts[a]
    )
    .forEach(reason=>{

        html += `

        <div class="summary-card">

            <h3>${reason}</h3>

            <p>${reasonCounts[reason]}</p>

        </div>

        `;

    });

    reasonContainer.innerHTML = html;

}

/* DETAILS */

function showDetails(i){

    const r = FLAT_DATA[i];

    let imgs = "";

    if(Array.isArray(r.photo)){

        imgs =
        `<div class="img-grid">
        ${r.photo.map(p =>
        `<img src="${p}">`
        ).join("")}
        </div>`;

    }

    document.getElementById("modalBody").innerHTML = `

    <p><b>Batch:</b> ${r.batchNo || "-"}</p>

    <p><b>Date:</b> ${r.date || "-"}</p>

    <p><b>Location:</b> ${r.location || "-"}</p>

    <p><b>Category:</b> ${r.category || "-"}</p>

    <p><b>Product:</b> ${r.product || "-"}</p>

    <p><b>Qty:</b> ${r.qty || "-"} ${r.uom || ""}</p>

    <p><b>Reason:</b> ${r.reason || "-"}</p>

    <p><b>Root Cause:</b> ${r.rootCause || "-"}</p>

    <p><b>Remarks:</b> ${r.remarks || "-"}</p>

    <p><b>QA:</b> ${r.qa || "-"}</p>

    <p><b>Process Owner:</b> ${r.processOwner || "-"}</p>

    <h3 style="margin-top:20px;color:#67e8f9">
    📸 Photos
    </h3>

    ${imgs || "<p>No photos uploaded</p>"}

    `;

    document.getElementById("modal")
    .style.display = "flex";

}

/* CLOSE */

function closeModal(){

    document.getElementById("modal")
    .style.display = "none";

}

/* RENDER */

function renderReports(){

    const container =
    document.getElementById("reportsContainer");

    const allReports = getReports();

    const reports =
    filterReports(allReports);

    FLAT_DATA = [];

    if(reports.length === 0){

        container.innerHTML =
        `<div class="empty">
        No reports found
        </div>`;

        updateGrandSummary([], {});

        return;

    }

    const grouped =
    groupReportsByDate(reports);

    container.innerHTML = "";

    Object.keys(grouped)
    .sort()
    .reverse()
    .forEach(date=>{

        let rows = "";

        grouped[date].forEach(r=>{

            const index =
            FLAT_DATA.length;

            FLAT_DATA.push(r);

            rows += `

            <tr onclick="showDetails(${index})">

            <td>${r.batchNo || "-"}</td>
            <td>${r.date || "-"}</td>
            <td>${r.location || "-"}</td>
            <td>${r.category || "-"}</td>
            <td>${r.product || "-"}</td>
            <td>${r.qty || "-"}</td>
            <td>${r.uom || "-"}</td>
            <td>${r.reason || "-"}</td>
            <td>${r.rootCause || "-"}</td>
            <td>${r.remarks || "-"}</td>
            <td>${r.qa || "-"}</td>
            <td>${r.processOwner || "-"}</td>

            </tr>

            `;

        });

        container.innerHTML += `

        <div class="folder-group">

        <div class="folder-header">

        <h2>📅 ${date}</h2>

        <span>
        ${grouped[date].length} Reports
        </span>

        </div>

        <div class="table-wrapper">

        <table>

        <thead>

        <tr>

        <th>Batch No</th>
        <th>Date</th>
        <th>Location</th>
        <th>Category</th>
        <th>Product</th>
        <th>Qty</th>
        <th>UOM</th>
        <th>Reason</th>
        <th>Root Cause</th>
        <th>Remarks</th>
        <th>QA</th>
        <th>Process Owner</th>

        </tr>

        </thead>

        <tbody>

        ${rows}

        </tbody>

        </table>

        </div>

        </div>

        `;

    });

    updateGrandSummary(reports,grouped);

}

/* INIT */

renderReports();

</script>

</body>
</html>
